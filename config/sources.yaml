# Source watchlist
# method: api | rss | fetch
# tier 1 = daily core
# tier 2 = optional / supporting source
#
# Global source rule:
# Use broad AI newsletters and aggregators for discovery, but rely on primary
# sources, independent benchmarks, technical blogs, public-sector sources, and
# credible reporting to decide what deserves coverage. Treat vendor announcements,
# demos, social posts, and benchmark claims as leads, not conclusions.

sources:
  # --- Papers / research discovery ---
  - name: arXiv Core AI/LLM/Agents
    method: api
    url: "http://export.arxiv.org/api/query?search_query=cat:cs.AI+OR+cat:cs.CL+OR+cat:cs.LG+OR+cat:cs.MA&sortBy=submittedDate&sortOrder=descending"
    tier: 1

  - name: arXiv Retrieval / Software Engineering / Security
    method: api
    url: "http://export.arxiv.org/api/query?search_query=cat:cs.IR+OR+cat:cs.SE+OR+cat:cs.CR&sortBy=submittedDate&sortOrder=descending"
    tier: 2

  - name: arXiv Vision / Robotics / Earth AI
    method: api
    url: "http://export.arxiv.org/api/query?search_query=cat:cs.CV+OR+cat:cs.RO+OR+cat:eess.IV&sortBy=submittedDate&sortOrder=descending"
    tier: 2

