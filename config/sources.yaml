# Source watchlist. method: api | rss | fetch. tier 1 = daily core; tier 2 = optional.
sources:
  # --- Papers ---
  - name: arXiv (cs.AI/CL/LG/MA)
    method: api
    url: http://export.arxiv.org/api/query?search_query=cat:cs.AI+OR+cat:cs.CL+OR+cat:cs.LG+OR+cat:cs.MA&sortBy=submittedDate&sortOrder=descending
    tier: 1
  - name: Hugging Face Daily Papers
    method: api
    url: https://huggingface.co/api/daily_papers
    tier: 1
  - name: alphaXiv
    method: fetch
    url: https://www.alphaxiv.org
    tier: 2
  # --- Lab / official ---
  - name: Anthropic News
    method: fetch
    url: https://www.anthropic.com/news
    tier: 1
  - name: OpenAI News
    method: fetch
    url: https://openai.com/news/
    tier: 1
  - name: Google DeepMind Blog
    method: fetch
    url: https://deepmind.google/discover/blog/
    tier: 1
  - name: Hugging Face Blog
    method: fetch
    url: https://huggingface.co/blog
    tier: 1
  - name: Meta AI Blog
    method: fetch
    url: https://ai.meta.com/blog/
    tier: 2
  # --- News ---
  - name: TechCrunch AI
    method: rss
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    tier: 2
  - name: VentureBeat AI
    method: rss
    url: https://venturebeat.com/category/ai/feed/
    tier: 2
  - name: The Verge AI
    method: rss
    url: https://www.theverge.com/rss/index.xml
    tier: 2
  - name: Ars Technica
    method: rss
    url: https://feeds.arstechnica.com/arstechnica/index
    tier: 2
  # --- Newsletters / curation ---
  - name: TLDR AI
    method: fetch
    url: https://tldr.tech/ai
    tier: 1
  - name: Import AI
    method: rss
    url: https://importai.substack.com/feed
    tier: 2
  - name: The Batch
    method: fetch
    url: https://www.deeplearning.ai/the-batch/
    tier: 2
  - name: Last Week in AI
    method: rss
    url: https://lastweekin.ai/feed
    tier: 2
  # --- Community ---
  - name: Hacker News (AI)
    method: api
    url: https://hn.algolia.com/api/v1/search_by_date?tags=story
    tier: 1
  - name: r/LocalLLaMA
    method: rss
    url: https://www.reddit.com/r/LocalLLaMA/top/.rss?t=day
    tier: 1
  # --- Benchmarks ---
  - name: LMArena
    method: fetch
    url: https://lmarena.ai/leaderboard
    tier: 2
  - name: Artificial Analysis
    method: fetch
    url: https://artificialanalysis.ai/
